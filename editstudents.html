<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Students</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="addstudents.html">Add Students</a>
        <a href="viewstudents.html">View Students</a>
        <a href="logout.html">Logout</a>
    </nav>
    <h1 id="reg">Edit Student</h1>
    <form id="reg-form" action="viewstudents.html" method="get">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        <label for="id">ID:</label>
        <input type="text" id="id" name="id"><br><br>
        <label for="cgpa">CGPA:</label>
        <input type="text" id="cgpa" name="cgpa"><br><br>
        <label for="branch">Branch:</label>
        <input type="text" id="branch" name="branch"><br><br>
        <input type="submit" value="Update Student">
    </form>
    <script>
    (function () {
        const form = document.querySelector('form');
        const params = new URLSearchParams(window.location.search);
        const urlId = params.get('id');

        // Pre-fill if id provided
        if (urlId) {
            try {
                const students = JSON.parse(localStorage.getItem('students') || '[]');
                const student = students.find((s) => String(s.id) === String(urlId));
                if (student) {
                    document.getElementById('name').value = student.name;
                    document.getElementById('id').value = student.id;
                    document.getElementById('cgpa').value = student.cgpa;
                    document.getElementById('branch').value = student.branch;
                }
            } catch (e) {}
        }

        form.addEventListener('submit', function(event) {
            const name = document.getElementById('name').value.trim();
            const id = document.getElementById('id').value.trim();
            const cgpa = document.getElementById('cgpa').value.trim();
            const branch = document.getElementById('branch').value.trim();

            if (!name || !id || !cgpa || !branch) {
                alert('Please fill in all fields.');
                event.preventDefault();
                return;
            }

            if (!/^[a-zA-Z ]+$/.test(name)) {
                alert('Name should contain only letters and spaces.');
                event.preventDefault();
                return;
            }

            if (!/^\d+$/.test(id)) {
                alert('ID should be numeric only.');
                event.preventDefault();
                return;
            }

            const cgpaNum = Number(cgpa);
            if (Number.isNaN(cgpaNum) || cgpaNum < 0 || cgpaNum > 10) {
                alert('CGPA must be a number between 0 and 10.');
                event.preventDefault();
                return;
            }

            if (branch.length < 2) {
                alert('Branch is required.');
                event.preventDefault();
                return;
            }

            // Update localStorage
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            const idx = students.findIndex((s) => String(s.id) === String(id));
            if (idx === -1) {
                alert('Student not found.');
                event.preventDefault();
                return;
            }

            students[idx] = { name, id, cgpa: cgpaNum, branch };
            localStorage.setItem('students', JSON.stringify(students));
        });
    })();
    </script>
</body>
</html>
