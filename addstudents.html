<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Students</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="addstudents.html">Add Students</a>
        <a href="viewstudents.html">View Students</a>
        <a href="logout.html">Logout</a>
    </nav>

    <h1 id="title">Add Students</h1>
    <form id="reg-form" action="viewstudents.html" method="get">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        <label for="id">ID:</label>
        <input type="text" id="id" name="id"><br><br>
        <label for="cgpa">CGPA:</label>
        <input type="text" id="cgpa" name="cgpa"><br><br>
        <label for="branch">Branch:</label>
        <input type="text" id="branch" name="branch"><br><br>
        <input type="submit" value="Add Student">
    </form>
    
    <script>
    const form = document.querySelector('#reg-form');
    form.addEventListener('submit', function(event) {
        const name = document.getElementById('name').value;
        const id = document.getElementById('id').value;
        const cgpa = document.getElementById('cgpa').value;
        const branch = document.getElementById('branch').value;

        if (!name || !id || !cgpa || !branch) {
            alert('Please fill in all fields.');
            event.preventDefault();
        }
    });
    </script>
</body>
</html>
