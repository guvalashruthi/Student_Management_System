<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Students</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
            <nav>
                <a href="dashboard.html">Dashboard</a>
                <a href="addstudents.html">Add Students</a>
                <a href="viewstudents.html">View Students</a>
                <a href="logout.html">Logout</a>
            </nav>
    <h1 id="reg">View Students</h1>
    <p id="view-students-error" style="text-align:center;"></p>
    <table border="0" cellpadding="10">
        <tr>
            <th>Name</th>
            <th>ID</th>
            <th>CGPA</th>
            <th>Branch</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>
        <tbody id="students-body">
            <tr>
                <td colspan="6">No students found.</td>
            </tr>
        </tbody>
    </table>

    <script>
        (function () {
            const tableBody = document.getElementById('students-body');
            const errEl = document.getElementById('view-students-error');

            function renderStudents(students) {
                tableBody.innerHTML = '';
                if (!students || students.length === 0) {
                    const tr = document.createElement('tr');
                    const td = document.createElement('td');
                    td.colSpan = 6;
                    td.textContent = 'No students found.';
                    tr.appendChild(td);
                    tableBody.appendChild(tr);
                    return;
                }

                students.forEach((s) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${s.name}</td>
                        <td>${s.id}</td>
                        <td>${s.cgpa}</td>
                        <td>${s.branch}</td>
                        <td><a href="editstudents.html?id=${encodeURIComponent(s.id)}">Edit</a></td>
                        <td><button type="button" onclick="deleteStudent('${s.id}')">Delete</button></td>
                    `;
                    tableBody.appendChild(tr);
                });
            }

            window.deleteStudent = function (id) {
                try {
                    const students = JSON.parse(localStorage.getItem('students') || '[]');
                    const updated = students.filter((s) => String(s.id) !== String(id));
                    localStorage.setItem('students', JSON.stringify(updated));
                    renderStudents(updated);
                } catch (e) {
                    if (errEl) errEl.textContent = 'Failed to delete student.';
                }
            };

            let students = [];
            try {
                students = JSON.parse(localStorage.getItem('students') || '[]');
            } catch (e) {
                students = [];
            }

            if (errEl) errEl.textContent = '';
            renderStudents(students);
        })();
    </script>
</body>
</html>
